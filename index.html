<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#F8F3F4"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0c0d12"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <title>Claro AI</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/waveform.svg" />
    <link rel="shortcut icon" href="/waveform.svg" />

    <!-- Speed up Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Silkscreen (for the pixel pass in RevealHeadline) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Optional: subtle selection color to match brand -->
    <style>
      ::selection {
        background: #e07a5f22;
      }
      ::-moz-selection {
        background: #e07a5f22;
      }

      /* Optional: calm brand-tinted page background (can remove if using Tailwind styles elsewhere) */
      html,
      body,
      #root {
        height: 100%;
      }
      html {
        background:
          radial-gradient(1000px at 15% 25%, rgba(224, 122, 95, 0.012), transparent 70%),
          radial-gradient(900px at 85% 75%, rgba(61, 64, 91, 0.015), transparent 70%),
          linear-gradient(135deg, rgba(224, 122, 95, 0.01) 0%, rgba(61, 64, 91, 0.01) 100%),
          linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
        background-color: #f8f3f4;
      }
      body {
        margin: 0;
        background:
          radial-gradient(1000px at 15% 25%, rgba(224, 122, 95, 0.012), transparent 70%),
          radial-gradient(900px at 85% 75%, rgba(61, 64, 91, 0.015), transparent 70%),
          linear-gradient(135deg, rgba(224, 122, 95, 0.01) 0%, rgba(61, 64, 91, 0.01) 100%),
          linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
        background-color: #f8f3f4;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
