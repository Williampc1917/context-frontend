<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: light)"
      content="#F8F3F4"
    />
    <meta
      name="theme-color"
      media="(prefers-color-scheme: dark)"
      content="#0c0d12"
    />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("claro-theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.classList.toggle("dark", theme === "dark");
          document.documentElement.dataset.theme = theme;
        } catch {
          document.documentElement.dataset.theme = "light";
        }
      })();
    </script>
    <title>Claro AI</title>

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/waveform.svg" />
    <link rel="shortcut icon" href="/waveform.svg" />

    <!-- Speed up Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Silkscreen (for the pixel pass in RevealHeadline) -->
    <link
      href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- Optional: subtle selection color to match brand -->
    <style>
      ::selection {
        background: #e07a5f22;
      }
      ::-moz-selection {
        background: #e07a5f22;
      }

      /* Optional: calm brand-tinted page background (can remove if using Tailwind styles elsewhere) */
      html,
      body,
      #root {
        height: 100%;
      }
      :root {
        --shell-bg:
          radial-gradient(1000px at 15% 25%, rgba(224, 122, 95, 0.012), transparent 70%),
          radial-gradient(900px at 85% 75%, rgba(61, 64, 91, 0.015), transparent 70%),
          linear-gradient(135deg, rgba(224, 122, 95, 0.01) 0%, rgba(61, 64, 91, 0.01) 100%),
          linear-gradient(180deg, #fafafa 0%, #ffffff 100%);
        --shell-bg-color: #f8f3f4;
        --shell-text: #0f172a;
      }
      html.dark {
        --shell-bg:
          radial-gradient(1000px at 15% 25%, rgba(224, 122, 95, 0.12), transparent 70%),
          radial-gradient(900px at 85% 75%, rgba(111, 159, 255, 0.12), transparent 70%),
          linear-gradient(135deg, rgba(224, 122, 95, 0.05) 0%, rgba(61, 64, 91, 0.08) 100%),
          linear-gradient(180deg, #09111d 0%, #0f1724 100%);
        --shell-bg-color: #0c0d12;
        --shell-text: #e5eefb;
      }
      html {
        background: var(--shell-bg);
        background-color: var(--shell-bg-color);
      }
      body {
        margin: 0;
        background: var(--shell-bg);
        background-color: var(--shell-bg-color);
        color: var(--shell-text);
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
